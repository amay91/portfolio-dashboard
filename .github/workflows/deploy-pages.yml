name: Deploy to GitHub Pages

# Builds app/ and publishes it to GitHub Pages — but only once CI (typecheck,
# lint, unit tests, Playwright e2e) has actually passed on the same commit.
# Deliberately triggers on CI's completion (workflow_run), not on push
# directly: the two workflows used to fire independently off the same push,
# which meant a broken build could still redeploy the live site as long as
# the deploy job itself succeeded — CI failing was informational only, not a
# gate. `branches` here filters to workflow_run events whose *head branch*
# (the branch CI ran on) was main or master, so a CI run from a pull request
# branch never triggers a deploy. Also runnable by hand from the Actions tab
# (workflow_dispatch), which skips the CI-passed check since there's no
# associated CI run to check.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

# Pages deploys use GitHub's OIDC token (id-token: write) instead of a
# personal access token — nothing to create or store as a secret.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; a second push while one is still
# running cancels the older, now-outdated one rather than racing it.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Runs when manually dispatched, or when the workflow_run event that
    # triggered this is CI actually succeeding (not just finishing — a
    # failed or cancelled CI run should not publish anything).
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        working-directory: app
    steps:
      # workflow_run always checks out the default branch's *latest* commit
      # unless told otherwise — pinning to the exact commit CI just tested
      # (head_sha) means what gets deployed is provably the commit that
      # passed, even if something else was pushed in the few seconds since.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # GitHub Pages project sites serve from /<repo-name>/, not the domain
      # root, so every asset URL needs that prefix baked in at build time
      # (see vite.config.ts's `base`). github.event.repository.name is
      # always the exact repo name, so this needs no manual editing no
      # matter what the repo is called.
      - run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
